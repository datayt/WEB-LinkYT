<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapLink Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #e0e0e0; padding: 24px; min-height: 100vh; }
  .container { max-width: 1400px; margin: 0 auto; }
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .login-card { background: #151515; border: 1px solid #2a2a2a; padding: 40px; width: 100%; max-width: 400px; border-radius: 8px; }
  .login-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; }
  .input-group input { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; color: #fff; padding: 12px 16px; border-radius: 4px; }
  .login-btn { width: 100%; background: #ff1f1f; color: white; border: none; padding: 14px; border-radius: 4px; cursor: pointer; }
  .error-msg { color: #ff1f1f; margin-top: 12px; text-align: center; }
  #dashboard-screen { display: none; }
  .header { display: flex; justify-content: space-between; margin-bottom: 28px; }
  .logout-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 8px 18px; border-radius: 4px; cursor: pointer; }
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; }
  .tab { padding: 10px 20px; background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 14px; border-radius: 4px 4px 0 0; }
  .tab.active { background: #1a1a1a; color: #fff; border-bottom: 2px solid #ff1f1f; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .stats-bar { display: flex; gap: 20px; margin-bottom: 30px; }
  .stat-card { background: #151515; border: 1px solid #2a2a2a; padding: 20px; border-radius: 8px; flex: 1; }
  .stat-label { color: #777; font-size: 12px; text-transform: uppercase; }
  .stat-value { font-size: 32px; font-weight: 600; margin-top: 8px; }
  .table-container { background: #151515; border: 1px solid #2a2a2a; border-radius: 8px; overflow: auto; max-height: 500px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
  th { text-align: left; padding: 14px; background: #0d0d0d; color: #aaa; font-weight: 500; cursor: pointer; }
  td { padding: 12px 14px; border-bottom: 1px solid #1f1f1f; }
  .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
  .search-box input { flex: 1; background: #151515; border: 1px solid #2a2a2a; color: #fff; padding: 12px; border-radius: 4px; }
  .btn { background: #ff1f1f; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; }
  .btn-outline { background: transparent; border: 1px solid #333; color: #ccc; }
  .ad-form { background: #151515; border: 1px solid #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
  .ad-form select, .ad-form input, .ad-form textarea { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; color: #fff; padding: 10px; margin-bottom: 12px; border-radius: 4px; }
  .ad-form-row { display: flex; gap: 10px; }
  .ad-form-row > * { flex: 1; }
  .ad-item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 6px; }
  .ad-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ad-item-details { display: flex; gap: 20px; font-size: 12px; color: #888; }
  .ad-item button { background: #333; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; margin-left: 10px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <div id="login-screen">
    <div class="login-card">
      <div class="login-title">SnapLink Admin</div>
      <div class="input-group"><label>Email</label><input type="email" id="email" value="admin@snap.link"></div>
      <div class="input-group"><label>Password</label><input type="password" id="password"></div>
      <button class="login-btn" onclick="login()">Sign In</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <div id="dashboard-screen">
    <div class="header">
      <h1 style="background:linear-gradient(135deg,#fff,#ff1f1f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">SnapLink Admin</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('analytics')">Analytics</button>
      <button class="tab" onclick="switchTab('ads')">Manage Ads</button>
    </div>
    
    <!-- Analytics Tab -->
    <div id="analytics-tab" class="tab-content active">
      <div class="stats-bar">
        <div class="stat-card"><div class="stat-label">Total Clicks</div><div class="stat-value" id="total-clicks">-</div></div>
        <div class="stat-card"><div class="stat-label">Unique Links</div><div class="stat-value" id="unique-links">-</div></div>
        <div class="stat-card"><div class="stat-label">Top Country</div><div class="stat-value" id="top-country">-</div></div>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search clicks..." onkeyup="filterTable()">
        <button class="btn" onclick="loadClicks()">Refresh</button>
      </div>
      <div class="table-container">
        <table id="clicks-table">
          <thead><tr><th>Time</th><th>Short ID</th><th>IP</th><th>Country</th><th>City</th><th>Referrer</th></tr></thead>
          <tbody id="clicks-body"></tbody>
        </table>
      </div>
    </div>
    
    <!-- Ads Tab -->
    <div id="ads-tab" class="tab-content">
      <div class="ad-form">
        <h3 style="margin-bottom:15px;">Add New Ad</h3>
        <select id="ad-type">
          <option value="image">Image URL</option>
          <option value="video">Video URL (MP4)</option>
          <option value="youtube">YouTube Video URL</option>
          <option value="website">Website URL (Embed)</option>
          <option value="text">Text Message</option>
        </select>
        <input type="text" id="ad-content" placeholder="URL or text content">
        <div class="ad-form-row">
          <input type="number" id="ad-duration" placeholder="Duration (seconds)" value="10" min="3" max="60">
          <label style="display:flex; align-items:center; gap:8px; background:#0d0d0d; padding:0 12px; border-radius:4px; border:1px solid #2a2a2a;">
            <input type="checkbox" id="ad-skippable" checked> Skippable
          </label>
          <input type="number" id="ad-skipafter" placeholder="Skip after (seconds)" value="5" min="1">
        </div>
        <button class="btn" onclick="addAd()">Add Ad</button>
      </div>
      <div id="ads-list"></div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH8C5XOSbWwiPHHjSJo4l_v2mYhOVokRlXiVEcYgHAx4BKTAPHkUTrzMhwvJAh_U1B/exec';
  let authToken = localStorage.getItem('snap_token') || '';
  let clicksData = [];

  (async function init() {
    if (authToken) {
      const valid = await verifyToken();
      if (valid) showDashboard(); else localStorage.removeItem('snap_token');
    }
  })();

  async function login() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    try {
      const fd = new URLSearchParams(); fd.append('action','adminLogin'); fd.append('email',email); fd.append('password',pass);
      const res = await fetch(SCRIPT_URL, { method:'POST', body:fd });
      const data = await res.json();
      if (data.success) {
        authToken = data.token;
        localStorage.setItem('snap_token', authToken);
        showDashboard();
      } else err.textContent = data.message;
    } catch(e) { err.textContent = 'Connection error'; }
  }

  async function verifyToken() {
    try {
      const fd = new URLSearchParams(); fd.append('action','adminVerify'); fd.append('token',authToken);
      const res = await fetch(SCRIPT_URL, { method:'POST', body:fd });
      const data = await res.json();
      return data.valid;
    } catch { return false; }
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadClicks();
    loadAds();
  }

  function logout() {
    localStorage.removeItem('snap_token'); authToken = '';
    location.reload();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    if (tab === 'analytics') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('analytics-tab').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('ads-tab').classList.add('active');
    }
  }

  async function loadClicks() {
    const tbody = document.getElementById('clicks-body');
    tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';
    try {
      const fd = new URLSearchParams(); fd.append('action','getClicks'); fd.append('token',authToken);
      const res = await fetch(SCRIPT_URL, { method:'POST', body:fd });
      const data = await res.json();
      if (data.error) { alert('Session expired'); logout(); return; }
      clicksData = data.clicks || [];
      renderClicks(clicksData);
      updateStats(clicksData);
    } catch(e) { tbody.innerHTML = '<tr><td colspan="6">Error</td></tr>'; }
  }

  function renderClicks(data) {
    const tbody = document.getElementById('clicks-body');
    if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6">No clicks</td></tr>'; return; }
    tbody.innerHTML = data.map(c => `<tr><td>${c[0]}</td><td>${c[1]}</td><td>${c[2]}</td><td>${c[3]}</td><td>${c[4]}</td><td>${c[5]}</td></tr>`).join('');
  }

  function updateStats(data) {
    document.getElementById('total-clicks').textContent = data.length;
    const unique = new Set(data.map(c => c[1])).size;
    document.getElementById('unique-links').textContent = unique;
    const countries = data.map(c => c[3]).filter(c => c);
    const top = countries.sort((a,b) => countries.filter(v => v===a).length - countries.filter(v => v===b).length).pop() || '-';
    document.getElementById('top-country').textContent = top;
  }

  function filterTable() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const filtered = clicksData.filter(c => c.some(field => String(field).toLowerCase().includes(term)));
    renderClicks(filtered);
  }

  async function loadAds() {
    try {
      const fd = new URLSearchParams(); fd.append('action','getAds'); fd.append('token',authToken);
      const res = await fetch(SCRIPT_URL, { method:'POST', body:fd });
      const data = await res.json();
      const list = document.getElementById('ads-list');
      list.innerHTML = data.ads.map(ad => `
        <div class="ad-item">
          <div class="ad-item-header">
            <span><strong>${ad.type.toUpperCase()}</strong> ${ad.content.substring(0,40)}...</span>
            <div>
              <button onclick="toggleActive('${ad.id}', ${!ad.active})">${ad.active ? 'Disable' : 'Enable'}</button>
              <button onclick="deleteAd('${ad.id}')">Delete</button>
            </div>
          </div>
          <div class="ad-item-details">
            <span>⏱️ Duration: ${ad.duration}s</span>
            <span>⏭️ Skippable: ${ad.skippable ? 'Yes' : 'No'}</span>
            ${ad.skippable ? `<span>⏩ Skip after: ${ad.skipAfter}s</span>` : ''}
          </div>
        </div>
      `).join('');
    } catch(e) {}
  }

  async function addAd() {
    const type = document.getElementById('ad-type').value;
    const content = document.getElementById('ad-content').value.trim();
    const duration = parseInt(document.getElementById('ad-duration').value) || 10;
    const skippable = document.getElementById('ad-skippable').checked;
    const skipAfter = parseInt(document.getElementById('ad-skipafter').value) || 5;
    
    if (!content) return alert('Enter content');
    const fd = new URLSearchParams();
    fd.append('action','addAd');
    fd.append('token',authToken);
    fd.append('type',type);
    fd.append('content',content);
    fd.append('duration',duration);
    fd.append('skippable',skippable);
    fd.append('skipAfter',skipAfter);
    
    await fetch(SCRIPT_URL, { method:'POST', body:fd });
    document.getElementById('ad-content').value = '';
    loadAds();
  }

  async function deleteAd(id) {
    const fd = new URLSearchParams(); fd.append('action','deleteAd'); fd.append('token',authToken); fd.append('id',id);
    await fetch(SCRIPT_URL, { method:'POST', body:fd });
    loadAds();
  }

  async function toggleActive(id, active) {
    const fd = new URLSearchParams(); fd.append('action','toggleAd'); fd.append('token',authToken); fd.append('id',id); fd.append('active',active);
    await fetch(SCRIPT_URL, { method:'POST', body:fd });
    loadAds();
  }
</script>
</body>
</html>

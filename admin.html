<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTSnap Admin — Analytics Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0b0b0b;
    color: #e0e0e0;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  
  /* Login Screen */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
  }
  .login-card {
    background: #151515;
    border: 1px solid #2a2a2a;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    border-radius: 8px;
  }
  .login-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .login-sub {
    color: #777;
    margin-bottom: 28px;
    font-size: 14px;
  }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .input-group input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 12px 16px;
    font-size: 14px;
    border-radius: 4px;
    outline: none;
    transition: border 0.2s;
  }
  .input-group input:focus { border-color: #ff1f1f; }
  .login-btn {
    width: 100%;
    background: #ff1f1f;
    color: white;
    border: none;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.9; }
  .error-msg {
    color: #ff1f1f;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
  }

  /* Dashboard Screen */
  #dashboard-screen { display: none; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    background: linear-gradient(135deg, #fff, #ff1f1f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logout-btn {
    background: transparent;
    border: 1px solid #333;
    color: #aaa;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  .logout-btn:hover { border-color: #ff1f1f; color: #ff1f1f; }
  
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: #151515;
    border: 1px solid #2a2a2a;
    padding: 20px 24px;
    border-radius: 8px;
    flex: 1;
  }
  .stat-label { color: #777; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 36px; font-weight: 600; margin-top: 8px; color: #fff; }
  
  .table-container {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: auto;
    max-height: 600px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1200px;
  }
  th {
    text-align: left;
    padding: 16px;
    background: #0d0d0d;
    color: #aaa;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 11px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    cursor: pointer;
  }
  th:hover { color: #ff1f1f; }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid #1f1f1f;
    color: #ccc;
    word-break: break-word;
  }
  tr:hover td { background: #1a1a1a; }
  
  .search-box {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
  }
  .search-box input {
    flex: 1;
    background: #151515;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 12px 16px;
    border-radius: 4px;
  }
  .refresh-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 0 20px;
    border-radius: 4px;
    cursor: pointer;
  }
  .loading { text-align: center; padding: 40px; color: #777; }
</style>
</head>
<body>
<div class="container">
  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-title">YTSnap Admin</div>
      <div class="login-sub">Secure analytics dashboard</div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@ytsnap.com" value="">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="login-btn" onclick="login()">Sign In</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboard-screen">
    <div class="header">
      <h1>📊 YTSnap Analytics</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Total Clicks</div><div class="stat-value" id="total-clicks">-</div></div>
      <div class="stat-card"><div class="stat-label">Unique Videos</div><div class="stat-value" id="unique-videos">-</div></div>
      <div class="stat-card"><div class="stat-label">Top Country</div><div class="stat-value" id="top-country">-</div></div>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search by Video ID, IP, Country..." onkeyup="filterTable()">
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="table-container">
      <table id="data-table">
        <thead>
          <tr>
            <th onclick="sortTable(0)">Timestamp</th>
            <th onclick="sortTable(1)">Video ID</th>
            <th onclick="sortTable(2)">Short Link</th>
            <th onclick="sortTable(3)">IP Address</th>
            <th onclick="sortTable(4)">Country</th>
            <th onclick="sortTable(5)">City</th>
            <th onclick="sortTable(6)">Platform</th>
            <th onclick="sortTable(7)">Referrer</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="8" class="loading">Loading data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ⚠️ REPLACE WITH YOUR GOOGLE APPS SCRIPT WEB APP URL ⚠️
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXscQdrON2nEL4VJ2GEW59kNjQ4ZNImUvwbwH1qJSLC78WgMPoaKQ6KS_aY7WGN_bY/exec';
  
  let authToken = localStorage.getItem('ytsnap_token') || '';
  let rawData = [];

  // Check login status on load
  (async function init() {
    if (authToken) {
      const valid = await verifyToken();
      if (valid) showDashboard();
      else { localStorage.removeItem('ytsnap_token'); authToken = ''; }
    }
  })();

  async function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    if (!email || !pass) { err.textContent = 'Enter email and password'; return; }
    try {
      const formData = new URLSearchParams();
      formData.append('action', 'login');
      formData.append('email', email);
      formData.append('password', pass);
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        authToken = data.token;
        localStorage.setItem('ytsnap_token', authToken);
        showDashboard();
      } else {
        err.textContent = data.message || 'Invalid credentials';
      }
    } catch(e) { err.textContent = 'Connection error'; }
  }

  async function verifyToken() {
    try {
      const formData = new URLSearchParams();
      formData.append('action', 'verify');
      formData.append('token', authToken);
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
      const data = await res.json();
      return data.valid;
    } catch { return false; }
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadData();
  }

  function logout() {
    localStorage.removeItem('ytsnap_token');
    authToken = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  }

  async function loadData() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '<tr><td colspan="8" class="loading">Loading data...</td></tr>';
    try {
      const formData = new URLSearchParams();
      formData.append('action', 'getData');
      formData.append('token', authToken);
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
      const result = await res.json();
      if (result.error) { alert('Session expired. Please login again.'); logout(); return; }
      rawData = result.data || [];
      renderTable(rawData);
      updateStats(rawData);
    } catch(e) { tbody.innerHTML = '<tr><td colspan="8" class="loading">Error loading data</td></tr>'; }
  }

  function renderTable(data) {
    const tbody = document.getElementById('table-body');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="loading">No data yet</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(row => `
      <tr>
        <td>${escapeHtml(row[0] || '')}</td>
        <td>${escapeHtml(row[1] || '')}</td>
        <td style="max-width:250px">${escapeHtml(row[2] || '')}</td>
        <td>${escapeHtml(row[3] || '')}</td>
        <td>${escapeHtml(row[4] || '')}</td>
        <td>${escapeHtml(row[5] || '')}</td>
        <td>${escapeHtml(row[7] || '')}</td>
        <td>${escapeHtml(row[8] || '')}</td>
      </tr>
    `).join('');
  }

  function updateStats(data) {
    document.getElementById('total-clicks').textContent = data.length;
    const uniqueVids = new Set(data.map(r => r[1])).size;
    document.getElementById('unique-videos').textContent = uniqueVids;
    const countries = data.map(r => r[4]).filter(c => c && c !== 'Unknown');
    const top = countries.sort((a,b) => countries.filter(v => v===a).length - countries.filter(v => v===b).length).pop() || '-';
    document.getElementById('top-country').textContent = top;
  }

  function filterTable() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const filtered = rawData.filter(row => row.some(cell => String(cell).toLowerCase().includes(term)));
    renderTable(filtered);
  }

  let sortDirection = 1;
  function sortTable(colIdx) {
    sortDirection *= -1;
    const sorted = [...rawData].sort((a,b) => {
      let valA = a[colIdx] || '', valB = b[colIdx] || '';
      return valA.localeCompare(valB) * sortDirection;
    });
    renderTable(sorted);
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"]/g, function(c) {
      if (c === '&') return '&amp;'; if (c === '<') return '&lt;'; if (c === '>') return '&gt;'; if (c === '"') return '&quot;';
      return c;
    });
  }
</script>
</body>
</html>

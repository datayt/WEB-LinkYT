<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Loading...</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }
  .container {
    max-width: 800px;
    width: 90%;
    text-align: center;
  }
  .timer {
    font-size: 72px;
    font-weight: 700;
    color: #ff1f1f;
    margin-bottom: 10px;
  }
  .ad-container {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 24px;
    margin: 20px 0;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ad-image {
    max-width: 100%;
    max-height: 400px;
    border-radius: 8px;
  }
  .ad-video, .ad-youtube {
    width: 100%;
    max-height: 400px;
    border-radius: 8px;
  }
  .ad-website {
    width: 100%;
    height: 400px;
    border: none;
    border-radius: 8px;
    background: white;
  }
  .ad-text {
    font-size: 24px;
    color: #ccc;
    padding: 20px;
  }
  .skip-btn {
    background: #333;
    color: #aaa;
    border: 1px solid #444;
    padding: 12px 24px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }
  .skip-btn:hover:not(:disabled) {
    border-color: #ff1f1f;
    color: #ff1f1f;
  }
  .skip-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="timer" id="timer">10</div>
  <div class="ad-container" id="ad-container">
    <!-- Dynamic content will be inserted here -->
  </div>
  <button class="skip-btn" id="skip-btn" onclick="skipAd()" disabled>Skip Ad</button>
  <div class="footer">SnapLink — Smart Redirect</div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH8C5XOSbWwiPHHjSJo4l_v2mYhOVokRlXiVEcYgHAx4BKTAPHkUTrzMhwvJAh_U1B/exec';
  const urlParams = new URLSearchParams(window.location.search);
  const shortId = urlParams.get('id');
  
  let countdown = 10;
  let targetUrl = '';
  let adData = null;
  let skippable = false;
  let skipAfter = 5; // default seconds before skip button enables

  async function fetchTargetAndAd() {
    try {
      const formData = new URLSearchParams();
      formData.append('action', 'getTarget');
      formData.append('id', shortId);
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.error) {
        document.body.innerHTML = '<h2 style="color:red">Invalid link</h2>';
        return;
      }
      targetUrl = data.url;
      adData = data.ad;
      
      // Set timer based on ad duration (default 10)
      countdown = adData?.duration || 10;
      skippable = adData?.skippable || false;
      skipAfter = adData?.skipAfter || 5;
      
      document.getElementById('timer').textContent = countdown;
      displayAd(adData);
      
      // Send click analytics
      await sendAnalytics(shortId);
      
      // Start countdown
      updateTimer();
    } catch(e) {
      document.body.innerHTML = '<h2>Error loading</h2>';
    }
  }

  function displayAd(ad) {
    const container = document.getElementById('ad-container');
    container.innerHTML = '';
    
    if (!ad) {
      container.innerHTML = '<div class="ad-text">Advertisement</div>';
      return;
    }
    
    const type = ad.type;
    const content = ad.content;
    
    if (type === 'image') {
      const img = document.createElement('img');
      img.src = content;
      img.className = 'ad-image';
      container.appendChild(img);
    } else if (type === 'video') {
      const video = document.createElement('video');
      video.src = content;
      video.className = 'ad-video';
      video.controls = true;
      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;
      container.appendChild(video);
      video.play().catch(()=>{});
    } else if (type === 'youtube') {
      // Extract YouTube video ID from URL
      const videoId = extractYouTubeId(content);
      if (videoId) {
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;
        iframe.className = 'ad-youtube';
        iframe.allow = 'autoplay; encrypted-media';
        iframe.allowFullscreen = true;
        container.appendChild(iframe);
      } else {
        container.innerHTML = '<div class="ad-text">Invalid YouTube URL</div>';
      }
    } else if (type === 'website') {
      const iframe = document.createElement('iframe');
      iframe.src = content;
      iframe.className = 'ad-website';
      iframe.sandbox = 'allow-scripts allow-same-origin allow-popups';
      container.appendChild(iframe);
    } else {
      // text
      const div = document.createElement('div');
      div.className = 'ad-text';
      div.textContent = content;
      container.appendChild(div);
    }
  }

  function extractYouTubeId(url) {
    const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
    const match = url.match(reg);
    return match ? match[1] : null;
  }

  async function sendAnalytics(id) {
    try {
      const ipRes = await fetch('https://ipapi.co/json/');
      const ipData = await ipRes.json();
      const formData = new URLSearchParams();
      formData.append('action', 'click');
      formData.append('id', id);
      formData.append('ip', ipData.ip || '');
      formData.append('country', ipData.country_name || '');
      formData.append('city', ipData.city || '');
      formData.append('userAgent', navigator.userAgent);
      formData.append('platform', navigator.platform || '');
      formData.append('referrer', document.referrer || 'Direct');
      await fetch(SCRIPT_URL, { method: 'POST', body: formData });
    } catch(e) {}
  }

  function updateTimer() {
    const timerEl = document.getElementById('timer');
    const skipBtn = document.getElementById('skip-btn');
    
    timerEl.textContent = countdown;
    
    // Enable skip button if skippable and countdown <= (total - skipAfter) or countdown <= skipAfter?
    // Logic: total duration - skipAfter = time when skip becomes available
    const totalDuration = adData?.duration || 10;
    const secondsElapsed = totalDuration - countdown;
    
    if (skippable && secondsElapsed >= skipAfter) {
      skipBtn.disabled = false;
      skipBtn.textContent = 'Skip Ad';
    } else {
      skipBtn.disabled = true;
      skipBtn.textContent = `Skip in ${skipAfter - secondsElapsed}s`;
    }
    
    if (countdown <= 0) {
      redirectToTarget();
    } else {
      countdown--;
      setTimeout(updateTimer, 1000);
    }
  }

  function skipAd() {
    if (skippable && !document.getElementById('skip-btn').disabled) {
      redirectToTarget();
    }
  }

  function redirectToTarget() {
    if (!targetUrl) return;
    
    const ua = navigator.userAgent;
    const url = targetUrl;
    
    // YouTube
    if (url.includes('youtube.com/watch') || url.includes('youtu.be')) {
      const vid = extractYouTubeId(url);
      if (vid) {
        if (/iPhone|iPad|iPod/i.test(ua)) {
          window.location.href = `youtube://www.youtube.com/watch?v=${vid}`;
          setTimeout(() => { window.location.href = url; }, 2000);
          return;
        } else if (/Android/i.test(ua)) {
          window.location.href = `intent://www.youtube.com/watch?v=${vid}#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=${encodeURIComponent(url)};end`;
          return;
        }
      }
    }
    // Instagram
    if (url.includes('instagram.com')) {
      if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href = url.replace('https://', 'instagram://');
        setTimeout(() => { window.location.href = url; }, 1500);
        return;
      } else if (/Android/i.test(ua)) {
        window.location.href = `intent://${url.replace('https://', '')}#Intent;package=com.instagram.android;scheme=https;end`;
        return;
      }
    }
    // Facebook
    if (url.includes('facebook.com') || url.includes('fb.com')) {
      if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href = url.replace('https://', 'fb://');
        setTimeout(() => { window.location.href = url; }, 1500);
        return;
      } else if (/Android/i.test(ua)) {
        window.location.href = `intent://${url.replace('https://', '')}#Intent;package=com.facebook.katana;scheme=https;end`;
        return;
      }
    }
    // Default
    window.location.href = url;
  }

  if (!shortId) {
    document.body.innerHTML = '<h2>Missing link ID</h2>';
  } else {
    fetchTargetAndAd();
  }
</script>
</body>
</html>

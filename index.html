<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Same dark theme as before */
  :root {
    --red: #ff1f1f;
    --dark: #0a0a0a;
    --surface: #111;
    --border: #222;
    --muted: #444;
    --text: #f0f0f0;
    --mono: 'DM Mono', 'Courier New', monospace;
    --display: 'Bebas Neue', 'Impact', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,31,31,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,31,31,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 580px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-text {
    font-family: var(--display);
    font-size: clamp(52px, 12vw, 80px);
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--red) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 2px 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    top: -4px;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--red), transparent);
  }

  .label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }

  input[type="text"]:focus {
    border-color: var(--red);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  button {
    background: var(--red);
    color: #fff;
    border: none;
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 1px;
    padding: 12px 24px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }

  .error {
    font-size: 11px;
    color: var(--red);
    letter-spacing: 1px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.2s;
    min-height: 16px;
  }
  .error.show { opacity: 1; }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    display: none;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-card.show { display: block; }

  .output-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .link-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .link-box {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 11px;
    color: #888;
    word-break: break-all;
    line-height: 1.5;
    min-width: 0;
    cursor: text;
    user-select: all;
  }

  .copy-btn {
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .copy-btn:hover { border-color: var(--red); color: var(--red); }
  .copy-btn.copied { color: #3f3; border-color: #3f3; }

  .how {
    margin-top: 20px;
    border: 1px solid var(--border);
    padding: 20px 24px;
    background: #0c0c0c;
  }

  .how-title {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }

  .step-num {
    color: var(--red);
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .admin-link {
    margin-top: 30px;
    text-align: center;
    opacity: 0.5;
    font-size: 10px;
  }
  .admin-link a {
    color: var(--muted);
    text-decoration: none;
  }
</style>
</head>
<body>

  
  
  <div class="container" id="main-screen">
  <div class="logo">
    <span class="logo-text">SNAPLINK</span>
    <span class="logo-badge">PRO</span>
  </div>
  <p class="tagline">Short Links + Smart Redirects</p>

  <div class="card">
    <span class="label">Paste Any Link</span>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://... (YouTube, Instagram, any site)">
      <button onclick="generate()">SNAP</button>
    </div>
    <div class="error" id="error-msg">// invalid URL</div>
  </div>

  <div class="output-card" id="output-card">
    <div class="output-label">Your Short Link</div>
    <div class="link-row">
      <div class="link-box" id="generated-link"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">COPY</button>
    </div>
  </div>

  <div class="how">
    <div class="how-title">How it works</div>
    <div class="steps">
      <div class="step"><span class="step-num">01</span><span>Paste any URL → Get short link</span></div>
      <div class="step"><span class="step-num">02</span><span>Share it anywhere</span></div>
      <div class="step"><span class="step-num">03</span><span>Click shows a 10s ad page, then opens destination</span></div>
    </div>
  </div>
  
  <div class="admin-link">
    <a href="admin.html">🔐 Admin Panel</a>
  </div>
</div>

<script>
  // ⚠️ REPLACE WITH YOUR GOOGLE APPS SCRIPT WEB APP URL ⚠️
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH8C5XOSbWwiPHHjSJo4l_v2mYhOVokRlXiVEcYgHAx4BKTAPHkUTrzMhwvJAh_U1B/exec';

  function isValidUrl(url) {
    try { new URL(url); return true; } catch { return false; }
  }

  async function generate() {
    const input = document.getElementById('url-input').value.trim();
    const err = document.getElementById('error-msg');
    const card = document.getElementById('output-card');
    const linkEl = document.getElementById('generated-link');
    
    if (!isValidUrl(input)) {
      err.classList.add('show');
      card.classList.remove('show');
      return;
    }
    err.classList.remove('show');
    
    try {
      const formData = new URLSearchParams();
      formData.append('action', 'create');
      formData.append('url', input);
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.id) {
        const shortLink = `${window.location.origin}${window.location.pathname}?id=${data.id}`;
        linkEl.textContent = shortLink;
        card.classList.add('show');
        document.getElementById('copy-btn').textContent = 'COPY';
      } else {
        alert('Error generating link');
      }
    } catch(e) { alert('Connection error'); }
  }

  function copyLink() {
    const text = document.getElementById('generated-link').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'DONE ✓'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
    });
  }

  document.getElementById('url-input').addEventListener('keydown', e => { if(e.key==='Enter') generate(); });

  // If there's ?id= in URL, we're in redirect mode — but we'll handle in separate interstitial page
  // For simplicity, we redirect to interstitial page with id param
  (function() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      window.location.href = `interstitial.html?id=${id}`;
    }
  })();
</script>
</body>
